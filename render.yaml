# Render Blueprint — auto-provisions all services
# https://render.com/docs/blueprint-spec

databases:
  - name: processassessmentai-db
    plan: free
    databaseName: processassessmentai
    user: processai_user

services:
  - type: web
    name: processassessmentai
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: processassessmentai-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: NODE_VERSION
        value: 20.11.0
